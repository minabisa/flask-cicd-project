name: Build & Deploy to Docker Desktop K8s

on:
    push:
        branches: ["main"]

jobs:
    deploy:
        runs-on: self-hosted

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set image tag
              run: echo "IMAGE_TAG=v${{ github.run_number }}" >> $GITHUB_ENV

            - name: Login DockerHub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build & push image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  push: true
                  tags: |
                      ${{ secrets.DOCKERHUB_USERNAME }}/flask-app:${{ env.IMAGE_TAG }}
                      ${{ secrets.DOCKERHUB_USERNAME }}/flask-app:latest

            - name: Verify cluster access
              run: kubectl get nodes

            - name: Deploy with Helm
              run: |
                  helm upgrade --install flask ./helm/flask-cicd \
                    -n dev --create-namespace \
                    --set image.repository=${{ secrets.DOCKERHUB_USERNAME }}/flask-app \
                    --set image.tag=${{ env.IMAGE_TAG }}

            - name: Show pods
              run: kubectl get pods -n dev -o wide
